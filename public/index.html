<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casey & Greyson's Traditions</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#b5541c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Traditions">
<link rel="apple-touch-icon" href="/icon-192.svg">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf6ee;
    --parchment: #f5e9d6;
    --warm-tan: #e8d5b7;
    --rust: #b5541c;
    --rust-light: #d4693a;
    --brown: #6b3d1e;
    --brown-light: #8b5533;
    --sage: #7a8c6e;
    --sage-light: #9aad8c;
    --dusty-rose: #c9856b;
    --gold: #c89e4a;
    --text-dark: #3a2210;
    --text-mid: #6b4c2e;
    --text-light: #9b7c5c;
    --shadow: rgba(90,50,15,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: #e8ddd0;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(200,158,74,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(181,84,28,0.07) 0%, transparent 50%),
      url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    min-height: 100vh;
    font-family: 'Lora', serif;
    color: var(--text-dark);
    padding: 20px;
  }

  .page-wrap {
    max-width: 820px;
    margin: 0 auto;
  }

  /* HEADER */
  .header {
    text-align: center;
    padding: 40px 20px 30px;
    position: relative;
  }

  .header-rope {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .rope-line {
    height: 2px;
    width: 80px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .header-icon { font-size: 22px; }

  .header h1 {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(2.2rem, 6vw, 3.4rem);
    color: var(--brown);
    line-height: 1.1;
    text-shadow: 1px 2px 4px rgba(90,50,15,0.12);
  }

  .header-sub {
    font-family: 'Lora', serif;
    font-style: italic;
    color: var(--text-light);
    font-size: 0.95rem;
    margin-top: 6px;
    letter-spacing: 0.03em;
  }

  .year-badge {
    display: inline-block;
    background: var(--rust);
    color: #fff;
    font-family: 'Lora', serif;
    font-size: 0.8rem;
    padding: 3px 14px;
    border-radius: 20px;
    margin-top: 10px;
    letter-spacing: 0.08em;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .tab-btn {
    background: var(--parchment);
    border: 1.5px solid var(--warm-tan);
    color: var(--text-mid);
    font-family: 'Lora', serif;
    font-size: 0.88rem;
    padding: 8px 20px;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.2s;
    font-style: italic;
  }

  .tab-btn:hover { background: var(--warm-tan); }
  .tab-btn.active {
    background: var(--rust);
    border-color: var(--rust);
    color: #fff;
    font-style: normal;
    font-weight: 500;
  }

  /* CARDS */
  .card {
    background: var(--cream);
    border-radius: 6px;
    padding: 28px;
    margin-bottom: 22px;
    box-shadow: 2px 4px 18px var(--shadow), 0 1px 0 rgba(255,255,255,0.7) inset;
    border: 1px solid rgba(200,158,74,0.2);
    position: relative;
    animation: fadeUp 0.35s ease both;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 6px 6px 0 0;
    background: linear-gradient(90deg, var(--gold), var(--rust-light), var(--gold));
    opacity: 0.6;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ADD FORM */
  .add-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .form-row { display: flex; gap: 10px; flex-wrap: wrap; }

  .form-row input, .form-row select,
  .add-form input, .add-form textarea, .add-form select {
    flex: 1;
    min-width: 140px;
    background: var(--parchment);
    border: 1.5px solid var(--warm-tan);
    border-radius: 6px;
    padding: 9px 13px;
    font-family: 'Lora', serif;
    font-size: 0.9rem;
    color: var(--text-dark);
    outline: none;
    transition: border-color 0.2s;
  }

  .add-form input:focus, .add-form textarea:focus,
  .add-form select:focus, .form-row input:focus, .form-row select:focus {
    border-color: var(--rust-light);
  }

  .add-form textarea {
    resize: vertical;
    min-height: 64px;
  }

  .btn-add {
    background: var(--rust);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 10px 22px;
    font-family: 'Lora', serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.2s;
    align-self: flex-start;
  }
  .btn-add:hover { background: var(--rust-light); }

  /* SECTION LABEL */
  .section-label {
    font-family: 'Dancing Script', cursive;
    font-size: 1.5rem;
    color: var(--brown);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label span { font-size: 1.1rem; }

  /* TRADITION LIST */
  .tradition-list { display: flex; flex-direction: column; gap: 14px; }

  .tradition-item {
    background: var(--parchment);
    border: 1px solid var(--warm-tan);
    border-radius: 6px;
    padding: 16px 18px;
    position: relative;
    transition: box-shadow 0.2s;
  }

  .tradition-item:hover { box-shadow: 1px 3px 10px var(--shadow); }

  .tradition-item.completed {
    border-left: 4px solid var(--sage);
  }

  .tradition-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }

  .tradition-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: var(--brown);
    flex: 1;
  }

  .tradition-name.done-text { text-decoration: line-through; opacity: 0.6; }

  .tradition-meta {
    font-size: 0.78rem;
    color: var(--text-light);
    font-style: italic;
    margin-top: 3px;
  }

  .tradition-notes {
    font-size: 0.85rem;
    color: var(--text-mid);
    margin-top: 8px;
    line-height: 1.5;
    font-style: italic;
  }

  .tradition-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .btn-icon {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    padding: 3px 5px;
    border-radius: 4px;
    transition: background 0.15s;
    color: var(--text-light);
  }
  .btn-icon:hover { background: var(--warm-tan); color: var(--brown); }

  .check-btn {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 2px solid var(--sage-light);
    background: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .check-btn.checked { background: var(--sage); border-color: var(--sage); color: #fff; }

  .season-tag {
    font-size: 0.7rem;
    padding: 2px 9px;
    border-radius: 20px;
    background: var(--warm-tan);
    color: var(--text-mid);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .season-spring { background: #d6eacc; color: #3d6b2c; }
  .season-summer { background: #fde9b2; color: #7a5500; }
  .season-fall   { background: #f5d5a8; color: #7a3500; }
  .season-winter { background: #cce3f0; color: #245066; }
  .season-anytime { background: var(--warm-tan); color: var(--text-mid); }

  /* YEAR TOGGLE */
  .year-row {
    display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px;
  }

  .year-chip {
    font-size: 0.72rem;
    padding: 2px 9px;
    border-radius: 20px;
    border: 1.5px solid var(--warm-tan);
    background: none;
    cursor: pointer;
    font-family: 'Lora', serif;
    color: var(--text-mid);
    transition: all 0.15s;
  }
  .year-chip.marked { background: var(--rust); border-color: var(--rust); color: #fff; }

  /* IDEA BUCKET */
  .idea-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 16px;
    background: var(--parchment);
    border: 1px solid var(--warm-tan);
    border-radius: 6px;
    margin-bottom: 10px;
    animation: fadeUp 0.3s ease both;
  }

  .idea-bullet {
    font-size: 1.2rem;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .idea-text { flex: 1; }
  .idea-name {
    font-family: 'Playfair Display', serif;
    font-size: 0.98rem;
    color: var(--brown);
  }
  .idea-desc {
    font-size: 0.82rem;
    color: var(--text-light);
    font-style: italic;
    margin-top: 3px;
  }

  .idea-actions { display: flex; gap: 4px; align-items: center; }

  .btn-promote {
    font-size: 0.72rem;
    padding: 3px 10px;
    background: var(--sage);
    color: #fff;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-family: 'Lora', serif;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .btn-promote:hover { background: var(--sage-light); }

  /* STATS */
  .stats-row {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .stat-box {
    flex: 1; min-width: 120px;
    background: var(--parchment);
    border: 1px solid var(--warm-tan);
    border-radius: 6px;
    padding: 14px 16px;
    text-align: center;
  }

  .stat-num {
    font-family: 'Dancing Script', cursive;
    font-size: 2rem;
    color: var(--rust);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.78rem;
    color: var(--text-light);
    margin-top: 4px;
    font-style: italic;
  }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    color: var(--text-light);
    font-style: italic;
    padding: 24px;
    font-size: 0.9rem;
  }

  /* SECTION DIVIDER */
  .divider {
    display: flex; align-items: center; gap: 10px;
    margin: 18px 0 14px;
  }
  .divider-line { flex: 1; height: 1px; background: var(--warm-tan); }
  .divider-text { font-size: 0.78rem; color: var(--text-light); font-style: italic; }

  /* EDIT INLINE */
  .edit-input {
    background: var(--cream);
    border: 1.5px solid var(--rust-light);
    border-radius: 4px;
    padding: 4px 8px;
    font-family: 'Lora', serif;
    font-size: 0.9rem;
    color: var(--text-dark);
    width: 100%;
  }

  /* ACCORDION */
  .accordion { display: flex; flex-direction: column; gap: 10px; }

  .accordion-section { border-radius: 8px; overflow: hidden; border: 1px solid var(--warm-tan); }

  .accordion-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
    border: none; width: 100%; text-align: left;
    font-family: inherit;
  }

  .acc-spring  { background: #e8f3e0; }
  .acc-summer  { background: #fef6d6; }
  .acc-fall    { background: #faebd2; }
  .acc-winter  { background: #ddeef7; }
  .acc-anytime { background: var(--parchment); }

  .accordion-title {
    font-family: 'Dancing Script', cursive;
    font-size: 1.4rem;
    display: flex; align-items: center; gap: 10px;
  }

  .acc-spring  .accordion-title { color: #3d6b2c; }
  .acc-summer  .accordion-title { color: #7a5500; }
  .acc-fall    .accordion-title { color: #7a3500; }
  .acc-winter  .accordion-title { color: #245066; }
  .acc-anytime .accordion-title { color: var(--brown); }

  .acc-count {
    font-family: 'Lora', serif;
    font-size: 0.75rem;
    font-style: italic;
    opacity: 0.65;
    margin-left: 2px;
  }

  .acc-chevron {
    font-size: 0.75rem;
    transition: transform 0.25s;
    opacity: 0.5;
  }
  .accordion-section.open .acc-chevron { transform: rotate(180deg); }

  .accordion-body {
    display: none;
    padding: 10px 14px 14px;
    background: var(--cream);
    border-top: 1px solid var(--warm-tan);
    flex-direction: column;
    gap: 10px;
  }
  .accordion-section.open .accordion-body { display: flex; }

  /* HIDDEN */
  .hidden { display: none !important; }

  /* RESPONSIVE */
  @media (max-width: 520px) {
    .card { padding: 18px 14px; }
    .form-row { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="page-wrap">

  <!-- HEADER -->
  <div class="header">
    <div class="header-rope">
      <div class="rope-line"></div>
      <span class="header-icon">🌿</span>
      <div class="rope-line"></div>
    </div>
    <h1>Casey & Greyson</h1>
    <div class="header-sub">our little traditions, our big love</div>
    <div class="year-badge" id="currentYearBadge">2026</div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('traditions')">🕯️ Our Traditions</button>
    <button class="tab-btn" onclick="showTab('ideas')">✨ Idea Bucket</button>
    <button class="tab-btn" onclick="showTab('add')">＋ Add New</button>
  </div>

  <!-- TRADITIONS TAB -->
  <div id="tab-traditions">
    <div class="card">
      <div class="stats-row" id="statsRow"></div>
      <div class="accordion" id="accordionList"></div>
    </div>
  </div>

  <!-- IDEAS TAB -->
  <div id="tab-ideas" class="hidden">
    <div class="card">
      <div class="section-label"><span>🌱</span> Traditions We Want to Grow Into</div>
      <div class="add-form" style="margin-bottom: 18px;">
        <input type="text" id="ideaNameInput" placeholder="Tradition idea name…" />
        <input type="text" id="ideaDescInput" placeholder="Why it matters to you (optional)…" />
        <button class="btn-add" onclick="addIdea()">+ Add to Idea Bucket</button>
      </div>
      <div id="ideaList"></div>
    </div>
  </div>

  <!-- ADD TAB -->
  <div id="tab-add" class="hidden">
    <div class="card">
      <div class="section-label"><span>📖</span> Add a Tradition</div>
      <div class="add-form">
        <input type="text" id="tradName" placeholder="Tradition name (e.g. First Day of School photos)" />
        <textarea id="tradNotes" placeholder="Notes, memories, or why this one matters…"></textarea>
        <div class="form-row">
          <select id="tradSeason">
            <option value="anytime">🌿 Anytime</option>
            <option value="spring">🌸 Spring</option>
            <option value="summer">☀️ Summer</option>
            <option value="fall">🍂 Fall</option>
            <option value="winter">❄️ Winter</option>
          </select>
          <input type="text" id="tradDate" placeholder="Date or time of year (e.g. Dec 1)" />
        </div>
        <button class="btn-add" onclick="addTradition()">✓ Save Tradition</button>
      </div>
    </div>
  </div>

</div>

<script>
const YEARS = [2024, 2025, 2026, 2027, 2028, 2029, 2030];
const currentYear = 2026;

let traditions = [];
let ideas = [];

const SEASON_LABELS = {
  spring: '🌸 Spring', summer: '☀️ Summer',
  fall: '🍂 Fall', winter: '❄️ Winter', anytime: '🌿 Anytime'
};

const SEED_TRADITIONS = [
  { id: 't1', name: 'First Day of School Photo', notes: 'Same spot every year. Watch him grow.', season: 'fall', date: 'Late August', completed: {}, created: Date.now() },
  { id: 't2', name: 'Birthday Breakfast in Bed', notes: 'He picks the menu. Pancakes with candles count.', season: 'anytime', date: 'His Birthday', completed: {}, created: Date.now() },
  { id: 't3', name: 'Pumpkin Patch Trip', notes: 'Pick the most ridiculous pumpkin we can find.', season: 'fall', date: 'October', completed: {2024: true}, created: Date.now() },
  { id: 't4', name: 'Christmas Cookie Baking Day', notes: 'Mess allowed. Aprons required.', season: 'winter', date: 'December', completed: {2024: true, 2025: true}, created: Date.now() },
  { id: 't5', name: 'Spring Garden Planting', notes: 'Let him pick one thing to grow each year.', season: 'spring', date: 'April/May', completed: {}, created: Date.now() },
  { id: 't23', name: 'Annual Letter to Future Greyson', notes: 'Write him a letter on his birthday — who he is right now, what he loves, what made you laugh this year. Hand them all over on his 18th.', season: 'anytime', date: 'His Birthday', completed: {}, created: Date.now() },
  { id: 't24', name: 'His "Favorites" Birthday Interview', notes: 'Same questions every year on his birthday: favorite food, movie, best friend, what he wants to be. Video it. Watch the answers change.', season: 'anytime', date: 'His Birthday', completed: {}, created: Date.now() },
  { id: 't25', name: 'Apple Picking', notes: 'Lancaster County orchards in full glory. Pick, maybe press cider, bake something together when you get home.', season: 'fall', date: 'September / October', completed: {}, created: Date.now() },
  { id: 't26', name: 'Berry Picking', notes: 'Strawberries, blueberries, blackberries — whatever\'s in season. Half in the bucket, half in his mouth, and that\'s the tradition.', season: 'summer', date: 'June / July', completed: {}, created: Date.now() },
  { id: 't27', name: 'Full Moon Ritual', notes: 'Step outside, look up, scream if you need to. Release what isn\'t serving you. Teach him that nature holds space for big feelings.', season: 'anytime', date: 'Monthly Full Moon', completed: {}, created: Date.now() },
  { id: 't21', name: 'Holiday Family Photos', notes: 'Every December — dressed up, somewhere beautiful. Document how much he\'s grown each year.', season: 'winter', date: 'December', completed: {}, created: Date.now() },
  { id: 't22', name: 'Summer Bloom Photos', notes: 'Find somewhere in full color — sunflowers, wildflowers, a garden. Just the two of you and the light.', season: 'summer', date: 'July / August', completed: {}, created: Date.now() },
  { id: 't19', name: 'First Ice Cream of Summer — Mount Gretna Jigger Shop', notes: 'The official season opener. Same spot every year, let Greyson pick his flavor without any coaching.', season: 'summer', date: 'Early Summer', completed: {}, created: Date.now() },
  { id: 't20', name: 'Saturday Yardsaling', notes: 'May mornings, coffee in hand, Greyson gets a little budget to find his own treasure. You never know what you\'ll come home with.', season: 'spring', date: 'May Saturdays', completed: {}, created: Date.now() },
  { id: 't14', name: 'Harrisburg St. Patrick\'s Day Parade', notes: 'Bundle up, find a good spot, soak it all in. Treat stop after — it\'s tradition.', season: 'spring', date: 'March 17', completed: {}, created: Date.now() },
  { id: 't15', name: 'Leprechaun Trap Night', notes: 'Build it together the night before — sticks, a box, a gold coin as bait. He wakes up to green footprints, a tiny note, and a little treasure.', season: 'spring', date: 'March 16 (night before)', completed: {}, created: Date.now() },
  { id: 't16', name: 'St. Patrick\'s Day Green Breakfast', notes: 'Green pancakes, green eggs, green milk. Silly and simple and wildly memorable.', season: 'spring', date: 'March 17', completed: {}, created: Date.now() },
  { id: 't17', name: 'Mom\'s Birthday Hibachi', notes: 'October 30th — Casey\'s birthday dinner. Greyson gets a front row seat to the show.', season: 'fall', date: 'October 30', completed: {}, created: Date.now() },
  { id: 't18', name: 'Greyson\'s Birthday Breakfast in Bed', notes: 'He picks the whole menu. Pancakes with candles absolutely count. His day, his rules.', season: 'anytime', date: 'His Birthday', completed: {}, created: Date.now() },
  { id: 't13', name: 'Start Indoor Seeds Together', notes: 'Third week of March — he picks at least one thing to grow. Watch it go from seed to table.', season: 'spring', date: 'Third Week of March', completed: {}, created: Date.now() },
  { id: 't10', name: 'Annual Camping Trip — Season Opener', notes: 'First camping trip of the year together. Roast something, sleep under stars, start the warm season right.', season: 'spring', date: 'April / May', completed: {}, created: Date.now() },
  { id: 't11', name: 'Cherry Blossom Trip to DC', notes: 'Make a whole day of it — walk the Mall, find the best blooms, let him lead the way.', season: 'spring', date: 'Late March / Early April', completed: {}, created: Date.now() },
  { id: 't12', name: 'Beach Trip', notes: 'Salt, sand, and sunshine. His pick of activity for at least one hour.', season: 'summer', date: 'June – August', completed: {}, created: Date.now() },
  { id: 't6', name: 'Drive Through Christmas Lights', notes: 'Hot cocoa in hand, pajamas encouraged. Let Greyson pick the route.', season: 'winter', date: 'December', completed: {}, created: Date.now() },
  { id: 't7', name: 'Messick\'s Light Show', notes: 'Make it a whole evening — dinner after, or before. A Lancaster County classic.', season: 'winter', date: 'December', completed: {}, created: Date.now() },
  { id: 't8', name: 'Elizabethtown Train Display', notes: 'Greyson gets to watch the trains run as long as he wants. No rushing.', season: 'winter', date: 'December', completed: {}, created: Date.now() },
  { id: 't9', name: 'Annual Christmas Ornament Shopping', notes: 'He picks his own ornament every year. Someday he\'ll have a whole tree of memories.', season: 'winter', date: 'December', completed: {}, created: Date.now() },
];

const SEED_IDEAS = [
  { id: 'i1', name: 'Sunrise Hike on His Half Birthday', desc: 'Celebrate the in-between. Coffee for mom, hot chocolate for him.' },
  { id: 'i2', name: 'Annual Letter to Future Greyson', desc: 'Write him a letter each year about who he is right now. Give them on his 18th.' },
  { id: 'i3', name: 'Stargazing Night Camp-Out', desc: 'Backyard or a field. Just a blanket and the sky.' },
  { id: 'i4', name: 'Farmer\'s Market Saturday', desc: 'Monthly ritual — he picks one new food to try each time.' },
  { id: 'i5', name: 'New Year\'s Eve Traditions Jar', desc: 'Write favorite memories on slips of paper all year. Read them December 31st.' },
  { id: 'i6', name: 'Mother\'s Day Brunch He "Cooks"', desc: 'Age-appropriate, fully his creation. Frame the menu.' },
];

function load() {
  const t = localStorage.getItem('greyson-traditions');
  const i = localStorage.getItem('greyson-ideas');
  traditions = t ? JSON.parse(t) : SEED_TRADITIONS;
  ideas = i ? JSON.parse(i) : SEED_IDEAS;
}

function save() {
  localStorage.setItem('greyson-traditions', JSON.stringify(traditions));
  localStorage.setItem('greyson-ideas', JSON.stringify(ideas));
}

function uid() { return 't' + Date.now() + Math.random().toString(36).slice(2,6); }

function showTab(name) {
  ['traditions','ideas','add'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('hidden', t !== name);
  });
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', ['traditions','ideas','add'][i] === name);
  });
  if (name === 'traditions') renderTraditions();
  if (name === 'ideas') renderIdeas();
}

function renderStats() {
  const total = traditions.length;
  const done = traditions.filter(t => t.completed && t.completed[currentYear]).length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-label">traditions</div></div>
    <div class="stat-box"><div class="stat-num">${done}</div><div class="stat-label">done in ${currentYear}</div></div>
    <div class="stat-box"><div class="stat-num">${total - done}</div><div class="stat-label">still to come</div></div>
    <div class="stat-box"><div class="stat-num">${ideas.length}</div><div class="stat-label">ideas waiting</div></div>
  `;
}

function toggleAccordion(season) {
  const el = document.getElementById('acc-' + season);
  if (!el) return;
  el.classList.toggle('open');
}

const SEASONS_ORDER = [
  { key: 'spring',  label: '🌸 Spring',  cls: 'acc-spring'  },
  { key: 'summer',  label: '☀️ Summer',  cls: 'acc-summer'  },
  { key: 'fall',    label: '🍂 Fall',    cls: 'acc-fall'    },
  { key: 'winter',  label: '❄️ Winter',  cls: 'acc-winter'  },
  { key: 'anytime', label: '🌿 Anytime', cls: 'acc-anytime' },
];

function renderTraditionItem(t) {
  const isDone = t.completed && t.completed[currentYear];
  const yearChips = YEARS.map(y =>
    `<button class="year-chip ${t.completed && t.completed[y] ? 'marked' : ''}"
      onclick="toggleYear('${t.id}', ${y})">${y}</button>`
  ).join('');
  return `
  <div class="tradition-item ${isDone ? 'completed' : ''}" id="item-${t.id}">
    <div class="tradition-top">
      <div style="flex:1">
        <div class="tradition-name ${isDone ? 'done-text' : ''}">${t.name}</div>
        <div class="tradition-meta">${t.date ? t.date : ''}</div>
        ${t.notes ? `<div class="tradition-notes">${t.notes}</div>` : ''}
        <div class="year-row">${yearChips}</div>
      </div>
      <div class="tradition-actions">
        <button class="check-btn ${isDone ? 'checked' : ''}" onclick="toggleYear('${t.id}', ${currentYear})" title="Mark ${currentYear} complete">${isDone ? '✓' : ''}</button>
        <button class="btn-icon" onclick="editTradition('${t.id}')" title="Edit">✏️</button>
        <button class="btn-icon" onclick="deleteTradition('${t.id}')" title="Delete">🗑️</button>
      </div>
    </div>
  </div>`;
}

function renderTraditions() {
  renderStats();
  const container = document.getElementById('accordionList');

  // remember which sections are open
  const openSections = new Set(
    SEASONS_ORDER.map(s => s.key).filter(k => {
      const el = document.getElementById('acc-' + k);
      return el && el.classList.contains('open');
    })
  );

  container.innerHTML = SEASONS_ORDER.map(season => {
    const items = traditions.filter(t => t.season === season.key);
    const isOpen = openSections.size === 0
      ? true  // default all open on first load
      : openSections.has(season.key);
    return `
    <div class="accordion-section ${isOpen ? 'open' : ''}" id="acc-${season.key}">
      <button class="accordion-header ${season.cls}" onclick="toggleAccordion('${season.key}')">
        <span class="accordion-title">
          ${season.label}
          <span class="acc-count">${items.length} tradition${items.length !== 1 ? 's' : ''}</span>
        </span>
        <span class="acc-chevron">▼</span>
      </button>
      <div class="accordion-body">
        ${items.length
          ? items.map(renderTraditionItem).join('')
          : '<div class="empty">Nothing here yet — add one! 🌿</div>'
        }
      </div>
    </div>`;
  }).join('');
}

function toggleYear(id, year) {
  const t = traditions.find(x => x.id === id);
  if (!t) return;
  if (!t.completed) t.completed = {};
  t.completed[year] = !t.completed[year];
  save();
  renderTraditions();
}

function deleteTradition(id) {
  if (!confirm('Remove this tradition?')) return;
  traditions = traditions.filter(t => t.id !== id);
  save();
  renderTraditions();
}

function editTradition(id) {
  const t = traditions.find(x => x.id === id);
  if (!t) return;
  const newName = prompt('Edit tradition name:', t.name);
  if (newName !== null && newName.trim()) {
    t.name = newName.trim();
    const newNotes = prompt('Edit notes:', t.notes || '');
    if (newNotes !== null) t.notes = newNotes.trim();
    save();
    renderTraditions();
  }
}

function addTradition() {
  const name = document.getElementById('tradName').value.trim();
  if (!name) { alert('Give this tradition a name 🌿'); return; }
  traditions.push({
    id: uid(),
    name,
    notes: document.getElementById('tradNotes').value.trim(),
    season: document.getElementById('tradSeason').value,
    date: document.getElementById('tradDate').value.trim(),
    completed: {},
    created: Date.now()
  });
  save();
  document.getElementById('tradName').value = '';
  document.getElementById('tradNotes').value = '';
  document.getElementById('tradDate').value = '';
  showTab('traditions');
}

function renderIdeas() {
  const list = document.getElementById('ideaList');
  if (!ideas.length) {
    list.innerHTML = '<div class="empty">Your idea bucket is empty — dream something up! ✨</div>';
    return;
  }
  const emojis = ['🌟','🍂','🌸','🕯️','🌙','🍃','🎶','🐝','🌻','🦋'];
  list.innerHTML = ideas.map((idea, i) => `
    <div class="idea-item">
      <div class="idea-bullet">${emojis[i % emojis.length]}</div>
      <div class="idea-text">
        <div class="idea-name">${idea.name}</div>
        ${idea.desc ? `<div class="idea-desc">${idea.desc}</div>` : ''}
      </div>
      <div class="idea-actions">
        <button class="btn-promote" onclick="promoteIdea('${idea.id}')">Make it real →</button>
        <button class="btn-icon" onclick="deleteIdea('${idea.id}')">🗑️</button>
      </div>
    </div>
  `).join('');
}

function addIdea() {
  const name = document.getElementById('ideaNameInput').value.trim();
  if (!name) { alert('What\'s the idea? ✨'); return; }
  ideas.push({
    id: 'i' + Date.now(),
    name,
    desc: document.getElementById('ideaDescInput').value.trim()
  });
  save();
  document.getElementById('ideaNameInput').value = '';
  document.getElementById('ideaDescInput').value = '';
  renderIdeas();
}

function deleteIdea(id) {
  ideas = ideas.filter(i => i.id !== id);
  save();
  renderIdeas();
}

function promoteIdea(id) {
  const idea = ideas.find(i => i.id === id);
  if (!idea) return;
  // Pre-fill the add form and switch tabs
  document.getElementById('tradName').value = idea.name;
  document.getElementById('tradNotes').value = idea.desc || '';
  ideas = ideas.filter(i => i.id !== id);
  save();
  showTab('add');
}

// INIT
document.getElementById('currentYearBadge').textContent = currentYear;
load();
renderTraditions();
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
</body>
</html>
